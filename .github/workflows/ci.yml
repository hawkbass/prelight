name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build + test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build must run before typecheck: consumer packages resolve
      # @prelight/core's types from ./dist/index.d.ts (see each
      # package.json's `types` field), so on a clean CI checkout dist/
      # does not exist until this step runs. Same ordering as
      # ground-truth.yml and prelight-dogfood.yml.
      - name: Build
        run: bun run --filter='./packages/*' build

      - name: Typecheck
        run: bun run --filter='./packages/*' typecheck

      - name: Test
        run: bun run --filter='./packages/*' test

      - name: Bundle budget
        run: bun run measure-bundle:strict
