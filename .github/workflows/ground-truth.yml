name: Ground truth

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly run against Chromium snapshot.
    - cron: '0 6 * * *'

jobs:
  corpus-agreement:
    name: Engine ↔ Prelight agreement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run --filter='./packages/*' build

      - name: Install Playwright browsers (Chromium + WebKit + Firefox)
        # The harness spawns Chromium itself and connects over WebSocket CDP
        # (DECISIONS #012 / #013). WebKit and Firefox use Playwright's
        # normal .launch() path — the pipe-CDP Windows issue is
        # Chromium-specific. We install all three to run --browser all.
        run: npx --yes playwright install --with-deps chromium webkit firefox
        working-directory: ground-truth

      - name: Run ground-truth harness (all engines, strict)
        # Executed under Node via tsx; Bun's WebSocket client did not
        # complete Playwright's connectOverCDP handshake on Windows
        # (DECISIONS #013). Linux CI would also succeed under Bun, but
        # keeping the runner consistent across platforms avoids
        # "works on CI, not locally" surprises.
        run: npx tsx run.ts --strict --browser all
        working-directory: ground-truth

      - name: Upload detailed report on failure
        if: failure()
        run: npx tsx run.ts --json --browser all > report.json
        working-directory: ground-truth

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ground-truth-report
          path: ground-truth/report.json
