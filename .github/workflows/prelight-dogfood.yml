name: Dogfood (CLI)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cli-smoke:
    name: CLI runs on dogfood config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run --filter='./packages/*' build

      # The dogfood-library declares known failures (German/Arabic at 1.5x for
      # NavLinks). We run the CLI and assert that exit code is 1 (failures
      # found) — this confirms the pipeline end-to-end.
      - name: Run Prelight CLI on dogfood config
        run: |
          set +e
          bun ../../packages/cli/dist/cli.js --reporter json > report.json
          code=$?
          cat report.json
          if [ "$code" != "1" ]; then
            echo "Expected exit 1 from dogfood (known failures); got $code"
            exit 1
          fi
        working-directory: demos/dogfood-library

      - uses: actions/upload-artifact@v4
        with:
          name: dogfood-report
          path: demos/dogfood-library/report.json
